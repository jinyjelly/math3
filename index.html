<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>곱셈공식(3) 테스트</title>
    <style>
        body { margin: 0; padding: 20px; background-color: #f0f4f8; display: flex; justify-content: center; font-family: sans-serif; }
        #X_CHALLENGE { text-align: center; background-color: #e3f2fd; padding: 20px; border-radius: 20px; border: 4px solid #2196f3; width: 100%; max-width: 380px; box-sizing: border-box; min-height: 400px; }
        .scr { display: none; } .scr.on { display: block; }
        .opt-btn { font-size: 1.05rem; width: 100%; padding: 12px; background: #fff; border: 2px solid #2196f3; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 8px; color: #1565c0; }
        .start-btn { font-size: 1.8rem; padding: 15px 40px; background: #1565c0; color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; margin-top: 50px; }
    </style>
</head>
<body>
<div id="X_CHALLENGE">
    <div id="S_START" class="scr on">
        <h2 style="color:#1565c0;">📐 곱셈공식(3) 테스트</h2>
        <p>이 버튼이 눌리는지 먼저 확인해 주세요!</p>
        <button onclick="startGame()" class="start-btn">테스트 시작</button>
    </div>
    <div id="S_QUIZ" class="scr">
        <h2 id="Q_TXT" style="margin-top:20px;">문제가 나옵니다</h2>
        <div id="O_BOX"></div>
    </div>
</div>
<script>
    function startGame() {
        alert("버튼이 작동합니다! 이제 음악을 넣어도 됩니다.");
        document.getElementById('S_START').classList.remove('on');
        document.getElementById('S_QUIZ').classList.add('on');
        make();
    }
    function make() {
        document.getElementById('Q_TXT').innerText = "(x+1)(x+2) 정답은?";
        let box = document.getElementById('O_BOX');
        let btn = document.createElement('button');
        btn.className = 'opt-btn'; btn.innerText = "x² + 3x + 2";
        btn.onclick = () => alert("정답입니다!");
        box.appendChild(btn);
    }
</script>
</body>
</html>
