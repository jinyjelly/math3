<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>곱셈공식(3) 챌린지</title>
    <style>
        body { margin: 0; padding: 20px; background-color: #f0f4f8; display: flex; justify-content: center; font-family: sans-serif; }
        #X_CHALLENGE { text-align: center; background-color: #e3f2fd; padding: 20px; border-radius: 20px; border: 4px solid #2196f3; width: 100%; max-width: 380px; box-sizing: border-box; min-height: 520px; position: relative; }
        .scr { display: none; } .scr.on { display: block; }
        #t-bar-box { width: 100%; height: 12px; background: #bbdefb; border-radius: 6px; margin-bottom: 15px; overflow: hidden; }
        #t-bar-inner { width: 100%; height: 100%; background: #2196f3; transition: width 0.1s linear; }
        .st-bar { display: flex; justify-content: space-around; font-weight: bold; color: #0d47a1; margin-bottom: 10px; }
        .pr { font-size: 1.6rem; font-weight: bold; margin: 30px 0; min-height: 60px; color: #333; display: flex; align-items: center; justify-content: center; }
        .opt-btn { font-size: 1.05rem; width: 100%; padding: 12px; background: #fff; border: 2px solid #2196f3; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 8px; color: #1565c0; }
        #fb-msg { margin-top:15px; font-weight:bold; min-height: 3em; color: #0d47a1; display: flex; align-items: center; justify-content: center; text-align: center; }
        .start-btn { font-size: 1.8rem; padding: 15px 40px; background: #1565c0; color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; margin-top: 50px; }
    </style>
</head>
<body>
<div id="X_CHALLENGE">
    <audio id="myBgm" loop src="bgm.mp3" preload="none"></audio>

    <div id="S_START" class="scr on">
        <h2 style="color:#1565c0;">📐 곱셈공식(3)<br>챌린지 🎶</h2>
        <p style="color:gray;">(x+a)(x+b) 전개 마스터!<br>버튼을 누르면 즉시 시작됩니다.</p>
        <button class="start-btn" onclick="startGameNow()">시작하기</button>
    </div>

    <div id="S_QUIZ" class="scr">
        <div id="t-bar-box"><div id="t-bar-inner"></div></div>
        <div class="st-bar">
            <div>점수: <span id="SCORE_VAL">0</span></div>
            <div>시간: <span id="TIME_VAL">60</span>초</div>
        </div>
        <div id="P_TXT" class="pr"></div>
        <div id="O_BOX"></div>
        <div id="fb-msg"></div>
    </div>

    <div id="S_RES" class="scr">
        <h2 style="color:#1565c0;">🏁 도전 종료!</h2>
        <p style="font-size: 1.8rem; margin: 10px 0;">최종 점수: <span id="FINAL_SCORE" style="color:red;">0</span>점</p>
        <button onclick="location.reload()" class="opt-btn" style="background:#2196f3; color:white; margin-top:20px;">다시 도전하기</button>
    </div>
</div>

<script>
    var ans = "", score = 0, timeLeft = 60, timer = null, isPaused = false;

    function startGameNow() {
        // 1. 화면부터 즉시 전환
        document.getElementById('S_START').classList.remove('on');
        document.getElementById('S_QUIZ').classList.add('on');

        // 2. 음악 재생 (무게감 있는 로딩 방지)
        try {
            var bgm = document.getElementById('myBgm');
            bgm.play().catch(e => console.log("음악 재생 대기 중"));
        } catch(e) {}

        startTimer();
        make();
    }

    function startTimer() {
        if(timer) clearInterval(timer);
        timer = setInterval(function() {
            if(!isPaused) {
                timeLeft--;
                document.getElementById('TIME_VAL').innerText = timeLeft;
                document.getElementById('t-bar-inner').style.width = (timeLeft/60)*100 + "%";
                if(timeLeft <= 0) endGame();
            }
        }, 1000);
    }

    function fmt(a, b) {
        let mid = a + b, last = a * b, s = "x²";
        if (mid > 0) s += " + " + (mid === 1 ? "" : mid) + "x";
        else if (mid < 0) s += " - " + (Math.abs(mid) === 1 ? "" : Math.abs(mid)) + "x";
        if (last > 0) s += " + " + last;
        else if (last < 0) s += " - " + Math.abs(last);
        return s;
    }

    function make() {
        isPaused = false;
        document.getElementById('fb-msg').innerHTML = "";
        let a = 0, b = 0;
        while(a === 0) a = Math.floor(Math.random() * 15) - 7;
        while(b === 0 || b === a) b = Math.floor(Math.random() * 15) - 7;

        let problemText = "(x " + (a > 0 ? "+ " + a : "- " + Math.abs(a)) + ")(x " + (b > 0 ? "+ " + b : "- " + Math.abs(b)) + ")";
        ans = fmt(a, b);

        let w1 = fmt(a, -b), w2 = "x² " + (a*b > 0 ? "+ " : "- ") + Math.abs(a*b), w3 = fmt(a+b, a*b).replace("x²", "x");

        document.getElementById('P_TXT').innerText = problemText;
        let os = [ans, w1, w2, w3].sort(() => 0.5 - Math.random());
        let box = document.getElementById('O_BOX'); box.innerHTML = "";
        os.forEach(v => {
            let btn = document.createElement('button'); btn.className = 'opt-btn'; btn.innerText = v;
            btn.onclick = () => { if(!isPaused) check(v); };
            box.appendChild(btn);
        });
    }

    function check(v) {
        let fb = document.getElementById('fb-msg');
        if(v === ans) {
            score += 100;
            document.getElementById('SCORE_VAL').innerText = score;
            fb.innerHTML = "<span style='color:blue;'>정답! +100 ✨</span>";
            setTimeout(make, 300);
        } else {
            isPaused = true; 
            fb.innerHTML = "<span style='color:red;'>오답! 🧐 정답은:</span><br>" + ans;
            setTimeout(make, 2000);
        }
    }

    function endGame() {
        clearInterval(timer);
        try { document.getElementById('myBgm').pause(); } catch(e) {}
        document.getElementById('S_QUIZ').classList.remove('on');
        document.getElementById('S_RES').classList.add('on');
        document.getElementById('FINAL_SCORE').innerText = score;
    }
</script>
</body>
</html>
